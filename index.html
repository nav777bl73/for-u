<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Эмилии ❤️</title>
    <style>
        /* ВСЕ СТИЛИ ЗДЕСЬ, ВНУТРИ HTML */
        body {
            margin: 0;
            height: 100vh;
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 48px;
            text-align: center;
            color: #dc0d0d;
            text-shadow: 
                0 0 10px #dc0d0d,
                0 0 25px #dc0d0d,
                0 0 50px #dc0d0d,
                0 0 100px #dc0d0d;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <h1>💖 eres mi reina, Emilia 👑</h1>
</body>
</html>
